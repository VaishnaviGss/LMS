<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>LMS Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3f0;
  --surface:#ffffff;
  --sidebar-bg:#1a0533;
  --sidebar-hover:rgba(255,255,255,0.07);
  --sidebar-active:rgba(167,139,250,0.18);
  --sidebar-active-border:#a78bfa;
  --text:#1a1a2e;
  --muted:#6b7280;
  --faint:#ede9fe;
  --border:rgba(0,0,0,0.07);
  --accent:#7c3aed;
  --accent2:#a78bfa;
  --accent-light:#ede9fe;
  --green:#059669;--green-bg:#ecfdf5;
  --red:#dc2626;--red-bg:#fef2f2;
  --amber:#d97706;--amber-bg:#fffbeb;
  --blue:#2563eb;--blue-bg:#eff6ff;
  --radius:12px;--radius-sm:8px;
  font-family:'Plus Jakarta Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overflow:hidden}
.layout{display:flex;height:100vh}

/* sidebar */
.sidebar{width:240px;flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;height:100vh;position:relative;overflow:hidden;z-index:100}
.sidebar::before{content:'';position:absolute;top:-60px;left:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(124,58,237,0.35) 0%,transparent 70%);pointer-events:none}
.sidebar::after{content:'';position:absolute;bottom:60px;right:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(167,139,250,0.2) 0%,transparent 70%);pointer-events:none}
.sidebar-logo{padding:22px 20px 18px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,0.06)}
.logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#a78bfa);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(124,58,237,0.4)}
.logo-icon svg{width:17px;height:17px;fill:#fff}
.logo-name{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:-0.02em}
.logo-sub{font-size:9px;color:rgba(167,139,250,0.7);letter-spacing:0.08em;text-transform:uppercase;font-weight:500}
.sidebar-scroll{flex:1;overflow-y:auto;padding:12px 12px}
.sidebar-scroll::-webkit-scrollbar{width:0}
.nav-section{font-size:9.5px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:0.1em;text-transform:uppercase;padding:12px 8px 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;margin:1px 0;transition:all 0.15s;position:relative;border-left:2px solid transparent}
.nav-item:hover{background:var(--sidebar-hover);color:rgba(255,255,255,0.85);border-left-color:rgba(167,139,250,0.3)}
.nav-item.active{background:var(--sidebar-active);color:#fff;border-left-color:var(--sidebar-active-border)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:rgba(124,58,237,0.7);color:#e9d5ff;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px}
.nav-badge.red{background:rgba(220,38,38,0.7);color:#fecaca}
.sidebar-footer{padding:14px 12px;border-top:1px solid rgba(255,255,255,0.06)}
.user-card{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.15s}
.user-card:hover{background:var(--sidebar-hover)}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:#fff}
.user-role{font-size:10px;color:rgba(255,255,255,0.4)}
.status-dot{width:7px;height:7px;border-radius:50%;background:#10b981;margin-left:auto;box-shadow:0 0 0 2px rgba(16,185,129,0.3)}

.page-frame{flex:1;overflow:hidden}
iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>

<div class="layout">
  <!-- SHELL SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h14V7L10 2zm0 2.5l5 3.5v8H5V8l5-3.5z"/><rect x="7.5" y="11" width="5" height="5" rx="0.5"/></svg>
      </div>
      <div>
        <div class="logo-name">LMS Portal</div>
        <div class="logo-sub">Org Admin</div>
      </div>
    </div>

    <div class="sidebar-scroll">
      <div class="nav-section">Main</div>
      <div class="nav-item active" data-page="lms_dashboard.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
        Dashboard
      </div>
      <div class="nav-item" data-page="lms_courses.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h12a1 1 0 011 1v10a1 1 0 01-1 1H2a1 1 0 01-1-1V3a1 1 0 011-1zm1 3v7h10V5H3z"/><path d="M5 7h6v1.5H5z"/></svg>
        Courses
        <span class="nav-badge">12</span>
      </div>
      <div class="nav-item" data-page="student_management.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 8a3 3 0 100-6 3 3 0 000 6zm-5 6a5 5 0 0110 0H3z"/></svg>
        Students
        <span class="nav-badge">247</span>
      </div>
      <div class="nav-item" data-page="mentor_management.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1V3a1 1 0 00-1-1H3zm2 3h6v1H5V5zm0 2.5h6v1H5v-1zm0 2.5h4v1H5V10z"/></svg>
        Mentors
        <span class="nav-badge">18</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H2a1 1 0 01-1-1V4zm0 5a1 1 0 011-1h12a1 1 0 011 1v3a1 1 0 01-1 1H2a1 1 0 01-1-1V9z"/></svg>
        Class Sessions
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M14 3H2a1 1 0 00-1 1v8a1 1 0 001 1h12a1 1 0 001-1V4a1 1 0 00-1-1zM5 9H3V7h2v2zm4 0H7V7h2v2zm4 0h-2V7h2v2z"/></svg>
        Attendance
      </div>

      <div class="nav-section">Finance</div>
      <div class="nav-item">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 4a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V4zm2-1v9h8V3H4zm1 2h6v1H5V5zm0 2h6v1H5V7zm0 2h4v1H5V9z"/></svg>
        Invoices
        <span class="nav-badge red">3</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1v1a4 4 0 000 8V1zm2 9.93A4 4 0 008 11v3a7 7 0 002-.07z"/><path d="M13 4a5 5 0 00-3-4.58V10a5 5 0 003-6z"/></svg>
        Payouts
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a6 6 0 100 12A6 6 0 008 2zM7 9V7h2v2H7zm0-3V5h2v1H7z"/></svg>
        Wallets
      </div>

      <div class="nav-section">Content</div>
      <div class="nav-item">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M5 3a1 1 0 000 2h6a1 1 0 000-2H5zm-1 4a1 1 0 011-1h6a1 1 0 010 2H5a1 1 0 01-1-1zm1 3a1 1 0 000 2h3a1 1 0 000-2H5z"/></svg>
        Topics & Assets
      </div>

      <div class="nav-section">System</div>
      <div class="nav-item">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
        Settings
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm-.75 4h1.5v4.5h-1.5V5zm0 5.5h1.5V12h-1.5v-1.5z"/></svg>
        User Roles
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar">AT</div>
        <div>
          <div class="user-name">Alex Thompson</div>
          <div class="user-role">Org Admin</div>
        </div>
        <div class="status-dot"></div>
      </div>
    </div>
  </div>

  <!-- PAGE FRAME -->
  <div class="page-frame">
    <iframe id="pageFrame" src="lms_dashboard.html"></iframe>
  </div>
</div>

<script>
const navItems = document.querySelectorAll('.nav-item[data-page]');
const iframe = document.getElementById('pageFrame');

// Inject CSS to hide sidebar in iframe
iframe.addEventListener('load', function() {
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    if (doc) {
      const style = doc.createElement('style');
      style.textContent = '.sidebar { display: none !important; } .layout { flex-direction: column; } .main { flex: 1; }';
      doc.head.appendChild(style);
    }
  } catch(e) {
    console.log('Cannot inject iframe CSS (cross-origin or not ready)');
  }
});

navItems.forEach(item => {
  item.addEventListener('click', function() {
    const page = this.getAttribute('data-page');
    iframe.src = page;
    navItems.forEach(n => n.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>

</body>
</html>
